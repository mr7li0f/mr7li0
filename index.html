      transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1);

    .gallery-item:hover::before {
      opacity: 1;
    }

    .gallery-image {
      width: 100%;

    }

    .gallery-item-placeholder {

    .empty-gallery {

      border-radius: 24px;
      margin: 0 auto;
      max-width: 600px;
      backdrop-filter: blur(16px) saturate(180%);

    .empty-gallery h3 {

    .empty-gallery p {

    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(2, 6, 23, 0.98);
      backdrop-filter: blur(20px) saturate(180%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      padding: 20px;
      animation: lightboxFadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes lightboxFadeIn {
      from {
        opacity: 0;
        backdrop-filter: blur(0px);
      }
      to {
        opacity: 1;
        backdrop-filter: blur(20px) saturate(180%);
      }
    }

    .lightbox-content {
      max-width: calc(100% - 40px);
      max-height: calc(100% - 40px);
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 24px;
      box-shadow: 0 30px 80px rgba(99, 102, 241, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.1);
      display: block;
      animation: imageZoomIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes imageZoomIn {
      from {
        opacity: 0;
        transform: scale(0.7) translateY(30px);
        filter: blur(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0px);
      }
    }

    .lightbox-close {
      position: fixed;
      top: 28px;
      right: 28px;
      background: rgba(10, 8, 24, 0.65);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1.5px solid rgba(239, 68, 68, 0.45);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.35s, border-color 0.35s, box-shadow 0.35s, transform 0.35s;
      z-index: 10002;
      box-shadow: 0 4px 20px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.06);
      animation: fadeInScale 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .lightbox-close svg {
      width: 22px;
      height: 22px;
      stroke: rgba(239, 68, 68, 0.9);
      transition: stroke 0.3s, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      flex-shrink: 0;
    }

    .lightbox-close:hover {
      background: rgba(239, 68, 68, 0.82);
      border-color: rgba(239, 68, 68, 0.7);
      box-shadow: 0 8px 28px rgba(239, 68, 68, 0.45), inset 0 1px 0 rgba(255,255,255,0.12);
      transform: scale(1.1);
    }

    .lightbox-close:hover svg {
      stroke: #ffffff;
      transform: rotate(90deg);
    }

    .lightbox-close:active {
      transform: scale(1.04);
    }

    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(10, 8, 24, 0.60);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1.5px solid rgba(99, 102, 241, 0.45);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.35s, border-color 0.35s, box-shadow 0.35s, transform 0.35s;
      z-index: 10002;
      box-shadow: 0 4px 20px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .lightbox-nav svg {
      width: 26px;
      height: 26px;
      stroke: rgba(160, 160, 255, 0.9);
      stroke-width: 2.5;
      transition: stroke 0.3s;
    }

    .lightbox-nav:hover {
      background: rgba(99, 102, 241, 0.80);
      border-color: rgba(99, 102, 241, 0.75);
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.5), inset 0 1px 0 rgba(255,255,255,0.12);
      transform: translateY(-50%) scale(1.1);
    }

    .lightbox-nav:hover svg { stroke: #ffffff; }

    .lightbox-nav-prev:hover {
      transform: translateY(-50%) translateX(-6px) scale(1.1);
    }

    .lightbox-nav-next:hover {
      transform: translateY(-50%) translateX(6px) scale(1.1);
    }

    .lightbox-nav:active {
      transform: translateY(-50%) scale(1.04);
    }

    .lightbox-nav-prev:active {
      transform: translateY(-50%) translateX(-3px) scale(1.04);
    }

    .lightbox-nav-next:active {
      transform: translateY(-50%) translateX(3px) scale(1.04);
    }

    .lightbox-nav-prev {
      left: 28px;
      animation: slideInLeft 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .lightbox-nav-next {
      right: 28px;
      animation: slideInRight 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .lightbox-counter {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 8, 24, 0.65);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1.5px solid rgba(99, 102, 241, 0.4);
      color: rgba(200, 200, 255, 0.9);
      padding: 10px 30px;
      border-radius: 32px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      z-index: 10002;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
      letter-spacing: 1px;
      animation: slideUpFade 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideUpFade {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(40px) scale(0.8);
        filter: blur(10px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1);
        filter: blur(0px);
      }
    }

    .contact-section {
      padding: 100px 40px;
      text-align: center;
    }

    .contact-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 60px;

      margin-bottom: 25px;
      background: linear-gradient(135deg, #ffffff 0%, #6366f1 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      width: 100%;
    }
    
    html[lang="ar"] .contact-section h2 {
      font-family: 'Alexandria', sans-serif;
      font-weight: 900;
    }

    .contact-section p {
      font-size: 20px;
      color: #94a3b8;
      margin-bottom: 50px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      text-align: center;
      width: 100%;

    .email-container {
      margin-bottom: 70px;
    }

    .email-link {
      display: inline-block;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);

      font-weight: 700;

    .email-link:hover {

    .social-section-title {

    .social-links {

    .social-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: #ffffff;

      background: linear-gradient(135deg, rgba(99, 102, 241, 0.12) 0%, rgba(168, 85, 247, 0.08) 100%);

    .social-link:hover {

      box-shadow: 
        0 10px 30px rgba(99, 102, 241, 0.4),
        0 0 40px rgba(99, 102, 241, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border-color: rgba(99, 102, 241, 0.5);

    .social-icon {

    }

    .footer {
      padding: 50px 40px;

      border-top: 1px solid rgba(99, 102, 241, 0.25);
      backdrop-filter: blur(20px) saturate(180%);
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.1);

    .footer-logo {
      font-family: 'Playfair Display', serif;
      font-size: 36px;

      background: linear-gradient(135deg, #ffffff 0%, #6366f1 100%);

    html[lang="ar"] .footer-logo {

    .footer-text {

    .scroll-to-top {
      position: fixed;
      bottom: 40px;
      right: 40px;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 9998;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
    }

    .scroll-to-top.visible {
      opacity: 1;
      visibility: visible;
    }

    .scroll-to-top:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px rgba(99, 102, 241, 0.6);
    }

    .scroll-to-top:active {
      transform: translateY(-3px) scale(0.95);
    }

    .scroll-to-top svg {
      width: 24px;
      height: 24px;
      stroke: white;
      stroke-width: 2.5;
    }

    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #020617;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
      overflow: hidden;
    }

    .loading-screen::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(circle at center,  rgba(99, 102, 241, 0.14) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(109, 40, 217, 0.10) 0%, transparent 40%),
        radial-gradient(circle at 20% 80%, rgba(79,  70, 229, 0.10) 0%, transparent 40%);
      animation: rotate 70s linear infinite;
    }

    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loading-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .loading-logo {
      font-family: 'Playfair Display', serif;
      font-size: 96px;
      font-weight: 900;
      background: linear-gradient(135deg, #ffffff 0%, #6366f1 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 60px;
      animation: floatLogo 3.5s ease-in-out infinite;
      filter: drop-shadow(0 0 40px rgba(99, 102, 241, 0.65)) drop-shadow(0 0 80px rgba(79, 70, 229, 0.35));
      letter-spacing: 0.02em;
    }

    html[lang="ar"] .loading-logo {
      font-family: 'Alexandria', sans-serif;
      font-weight: 900;
    }

    .loading-spinner-container {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .loading-spinner {
      position: absolute;
      width: 80px;
      height: 80px;
      border: 3px solid transparent;
      border-top: 3px solid #6366f1;
      border-right: 3px solid #a855f7;
      border-radius: 50%;
      animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
    }

    .loading-spinner-inner {
      position: absolute;
      width: 60px;
      height: 60px;
      top: 10px;
      left: 10px;
      border: 3px solid transparent;
      border-bottom: 3px solid #ec4899;
      border-left: 3px solid #8b5cf6;
      border-radius: 50%;
      animation: spin 2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite reverse;
    }

    .loading-dots {
      display: flex;
      gap: 12px;
      margin-top: 50px;
    }

    .loading-dot {
      width: 12px;
      height: 12px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 50%;
      animation: bounce 1.4s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
    }

    .loading-dot:nth-child(1) {
      animation-delay: 0s;
    }

    .loading-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes gradientShift {
      0%, 100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
      50% {
        transform: scale(1.1) rotate(3deg);
        opacity: 0.9;
      }
    }

    @keyframes floatLogo {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-15px);
      }
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes rotate {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0);
        opacity: 0.5;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.5);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateY(-50%) translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(-50%) translateX(0);
      }
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateY(-50%) translateX(30px);
      }
      to {
        opacity: 1;
        transform: translateY(-50%) translateX(0);
      }
    }

    (function () {
      var canvas = document.createElement('canvas');
      canvas.setAttribute('aria-hidden', 'true');
      canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;';
      document.body.insertBefore(canvas, document.body.firstChild);

      var ctx = canvas.getContext('2d');
      var W = 0, H = 0;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      // Blobs — all in the deep indigo / violet family
      var blobs = [
        { x: 0.14, y: 0.22, r: 0.62, c: [80,  70, 230], a: 0.21, sx: 0.060, sy: 0.080, ph: 0.0 },
        { x: 0.84, y: 0.68, r: 0.68, c: [100, 85, 245], a: 0.17, sx: 0.075, sy: 0.055, ph: 1.8 },
        { x: 0.50, y: 0.38, r: 0.52, c: [130, 80, 250], a: 0.14, sx: 0.048, sy: 0.072, ph: 3.5 },
        { x: 0.76, y: 0.18, r: 0.44, c: [ 70, 55, 210], a: 0.16, sx: 0.088, sy: 0.064, ph: 0.9 },
        { x: 0.22, y: 0.78, r: 0.56, c: [115, 55, 230], a: 0.13, sx: 0.058, sy: 0.046, ph: 2.3 },
        { x: 0.60, y: 0.55, r: 0.38, c: [ 90, 90, 255], a: 0.10, sx: 0.040, sy: 0.058, ph: 4.1 },
      ];

      function draw(ts) {
        var t = ts / 1000;
        ctx.clearRect(0, 0, W, H);

        for (var i = 0; i < blobs.length; i++) {
          var b  = blobs[i];
          var px = (b.x + Math.sin(t * b.sx + b.ph) * 0.14) * W;
          var py = (b.y + Math.cos(t * b.sy + b.ph) * 0.14) * H;
          var radius = b.r * Math.max(W, H) * 0.56;

          var g = ctx.createRadialGradient(px, py, 0, px, py, radius);
          g.addColorStop(0,   'rgba(' + b.c[0] + ',' + b.c[1] + ',' + b.c[2] + ',' + b.a + ')');

          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(px, py, radius, 0, Math.PI * 2);
          ctx.fill();
        }
        requestAnimationFrame(draw);
      }

                `).join('')}
              </div>
            ` : `
              <div class="empty-gallery">
                <div class="empty-gallery-icon">🖼️</div>
                <h3>${t('noImages')}</h3>
                <p>${t('addImages')}</p>
              </div>
            `}
          </div>
        </section>
      `;
    }

        telegram: '<svg class="social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>'

      return Object.entries(CONFIG.social).map(([platform, url]) => `
        <a class="social-link" href="${url}" target="_blank" rel="noopener noreferrer" aria-label="${platform}">
          ${socialIcons[platform]}
        </a>
      `).join('');
    }

    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -60px 0px' });

    function applyReveal() {
      requestAnimationFrame(() => {
        document.querySelectorAll('.reveal:not(.visible)').forEach(el => revealObserver.observe(el));
      });
    }

    function render() {
      const app = document.getElementById('app');
      
      if (currentView === 'home') {
        app.innerHTML = renderHomePage();
      } else if (currentView === 'subcategory' && selectedProject) {
        app.innerHTML = renderSubcategoryPage(selectedProject);
      } else if (currentView === 'gallery' && selectedProject && selectedSubcategory) {
        app.innerHTML = renderGalleryPage(selectedProject, selectedSubcategory);
      }

      window.scrollTo({ top: 0, behavior: 'smooth' });
      setTimeout(() => applyReveal(), 80);
    }

    function selectProject(index) {
      selectedProject = CONFIG.projects[index];
      currentView = 'subcategory';
      render();
    }

    function selectSubcategory(index) {
      selectedSubcategory = selectedProject.subcategories[index];
      currentView = 'gallery';
      render();
    }

    function goHome() {
      currentView = 'home';
      selectedProject = null;
      selectedSubcategory = null;
      render();
    }

    function backToSubcategories() {
      currentView = 'subcategory';
      selectedSubcategory = null;
      render();
    }

    function scrollToWork() {
      if (currentView !== 'home') {
        goHome();
        setTimeout(() => {
          document.getElementById('selected-work')?.scrollIntoView({ behavior: 'smooth' });
        }, 300);
      } else {
        document.getElementById('selected-work')?.scrollIntoView({ behavior: 'smooth' });
      }
    }

    function scrollToContact() {
      if (currentView !== 'home') {
        goHome();
        setTimeout(() => {
          document.getElementById('contact')?.scrollIntoView({ behavior: 'smooth' });
        }, 300);
      } else {
        document.getElementById('contact')?.scrollIntoView({ behavior: 'smooth' });
      }
    }

    let currentLightboxIndex = 0;
    let lightboxImages = [];

    function openLightbox(index) {
      if (!selectedSubcategory || !selectedSubcategory.images) return;
      
      lightboxImages = selectedSubcategory.images.filter(url => url);
      if (lightboxImages.length === 0) return;
      
      currentLightboxIndex = index;
      showLightbox();
    }

    function showLightbox() {
      const imageUrl = lightboxImages[currentLightboxIndex];
      const totalImages = lightboxImages.length;
      
      console.log('Opening lightbox for:', imageUrl);
      
      const existingLightbox = document.querySelector('.lightbox');
      const isFirstOpen = !existingLightbox;
      
      if (existingLightbox) {
        // Update existing lightbox for smooth transition
        const existingImg = existingLightbox.querySelector('.lightbox-content');
        const existingCounter = existingLightbox.querySelector('.lightbox-counter');
        
        if (existingImg) {
          // Fade out current image
          existingImg.style.opacity = '0';
          existingImg.style.transform = 'scale(0.95)';
          
          setTimeout(() => {
            // Update image source
            existingImg.src = imageUrl;
            existingImg.alt = selectedSubcategory.title[currentLang];
            
            existingImg.onload = () => {
              // Fade in new image
              existingImg.style.opacity = '1';
              existingImg.style.transform = 'scale(1)';
            };
          }, 300);
        }
        
        if (existingCounter) {
          existingCounter.textContent = `${currentLightboxIndex + 1} / ${totalImages}`;
        }
        
        return;
      }
      
      // Create new lightbox
      const lightbox = document.createElement('div');
      lightbox.className = 'lightbox';
      lightbox.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: flex; align-items: center; justify-content: center; z-index: 10000; padding: 20px;';
      
      const img = document.createElement('img');
      img.src = imageUrl;
      img.alt = selectedSubcategory.title[currentLang];
      img.className = 'lightbox-content';
      img.style.cssText = 'max-width: calc(100% - 40px); max-height: calc(100% - 40px); width: auto; height: auto; object-fit: contain; border-radius: 10px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); display: block; transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); opacity: 1; transform: scale(1);';
      img.loading = 'eager';
      img.onerror = () => {
        console.error('Failed to load image:', imageUrl);
        const errorMsg = document.createElement('div');
        errorMsg.style.cssText = 'color: white; font-size: 20px; text-align: center;';
        errorMsg.textContent = 'Failed to load image';
        img.replaceWith(errorMsg);
      };
      img.onload = () => {
        console.log('Image loaded successfully');
      };
      
      const closeBtn = document.createElement('button');
      closeBtn.className = 'lightbox-close';
      closeBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
      closeBtn.setAttribute('aria-label', 'Close');
      
      lightbox.appendChild(img);
      lightbox.appendChild(closeBtn);
      
      if (totalImages > 1) {
        const prevBtn = document.createElement('button');
        prevBtn.className = 'lightbox-nav lightbox-nav-prev';
        prevBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>';
        prevBtn.setAttribute('aria-label', 'Previous image');
        
        const nextBtn = document.createElement('button');
        nextBtn.className = 'lightbox-nav lightbox-nav-next';
        nextBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';
        nextBtn.setAttribute('aria-label', 'Next image');
        
        const counter = document.createElement('div');
        counter.className = 'lightbox-counter';
        counter.textContent = `${currentLightboxIndex + 1} / ${totalImages}`;
        
        lightbox.appendChild(prevBtn);
        lightbox.appendChild(nextBtn);
        lightbox.appendChild(counter);
        
        prevBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          navigateLightbox(-1);
        });
        
        nextBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          navigateLightbox(1);
        });
      }
      
      closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        closeLightbox();
      });
      
      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) {
          closeLightbox();
        }
      });
      
      document.body.appendChild(lightbox);
      document.body.style.overflow = 'hidden';
      
      console.log('Lightbox added to page');
    }

    function navigateLightbox(direction) {
      currentLightboxIndex += direction;
      
      if (currentLightboxIndex < 0) {
        currentLightboxIndex = lightboxImages.length - 1;
      } else if (currentLightboxIndex >= lightboxImages.length) {
        currentLightboxIndex = 0;
      }
      
      showLightbox();
    }

    function closeLightbox() {
      const lightbox = document.querySelector('.lightbox');
      if (lightbox) {
        lightbox.remove();
        document.body.style.overflow = 'auto';
      }
    }

    document.addEventListener('keydown', (e) => {
      const lightbox = document.querySelector('.lightbox');
      if (!lightbox) return;
      
      if (e.key === 'Escape') {
        closeLightbox();
      } else if (e.key === 'ArrowLeft') {
        navigateLightbox(-1);
      } else if (e.key === 'ArrowRight') {
        navigateLightbox(1);
      }
    });

    // Scroll to top button functionality
    const scrollToTopBtn = document.getElementById('scrollToTop');
    
    function toggleScrollButton() {
      if (window.scrollY > 300) {
        scrollToTopBtn.classList.add('visible');
      } else {
        scrollToTopBtn.classList.remove('visible');
      }
    }

    window.addEventListener('scroll', toggleScrollButton);

    scrollToTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    if (currentLang === 'ar') {
      document.documentElement.setAttribute('lang', 'ar');
      document.documentElement.setAttribute('dir', 'rtl');
      const navLangToggle = document.getElementById('navLanguageToggle');
      if (navLangToggle) navLangToggle.textContent = 'ع';
    }

    updateNavText();
    render();

    // Hide loading screen after content is loaded
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loadingScreen = document.getElementById('loadingScreen');
        if (loadingScreen) {
          loadingScreen.classList.add('hidden');
          setTimeout(() => {
            loadingScreen.style.display = 'none';
          }, 500);
        }
      }, 2500);
    });
